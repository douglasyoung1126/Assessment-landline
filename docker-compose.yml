version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: landline
      POSTGRES_PASSWORD: landline
      POSTGRES_DB: landline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landline"]
      interval: 2s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://landline:landline@db:5432/landline
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
